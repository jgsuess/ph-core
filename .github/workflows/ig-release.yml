name: IG Release Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without v prefix, e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: ig-release
  cancel-in-progress: false

jobs:
  build-and-publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Derive version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Checkout (tag)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || github.ref }}
          fetch-depth: 0
          lfs: true

      - name: Setup Node (for SUSHI + npm publish)
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@${{ github.repository_owner }}"

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Install Java (for IG Publisher)
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Cache IG Publisher
        id: cache-publisher
        uses: actions/cache@v5
        with:
          path: input-cache/publisher.jar
          key: ig-publisher-${{ hashFiles('ig.ini') }}

      - name: Download IG Publisher
        if: steps.cache-publisher.outputs.cache-hit != 'true'
        run: |
          mkdir -p input-cache
          curl -L -o input-cache/publisher.jar \
            https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar

      - name: Install Ruby and Jekyll (required by IG Publisher)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Install Jekyll
        run: gem install jekyll

      - name: Install Graphviz (for PlantUML dot renderer)
        run: sudo apt-get install -y graphviz

      - name: Patch version for release build (sushi-config.yaml)
        env:
          RELEASE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          python3 - <<'PY'
          import re, pathlib, os
          version = os.environ["RELEASE_VERSION"]
          p = pathlib.Path("sushi-config.yaml")
          txt = p.read_text(encoding="utf-8")
          txt = re.sub(r'(?m)^(version:\s*).+$',       r'\g<1>' + version,  txt)
          txt = re.sub(r'(?m)^(releaseLabel:\s*).+$',   r'\g<1>release',     txt)
          p.write_text(txt, encoding="utf-8")
          print(f"Patched sushi-config.yaml → version: {version}, releaseLabel: release")
          PY

      - name: Run IG Publisher (includes SUSHI)
        run: java -jar input-cache/publisher.jar ig.ini

      - name: Publish FHIR packages to GitHub npm registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.v.outputs.version }}
          SCOPE: "@${{ github.repository_owner }}"
        run: |
          publish_package() {
            local tgz="$1"
            [ -f "$tgz" ] || { echo "Skipping $tgz (not found)"; return 0; }
            local work
            work=$(mktemp -d)
            cp "$tgz" "$work/pkg.tgz"
            cd "$work"
            tar -xzf pkg.tgz
            local orig_name
            orig_name=$(node -p "require('./package/package.json').name")
            local scoped_name="${SCOPE}/$(echo "$orig_name" | sed 's|^@[^/]*/||')"
            node -e "
              const fs = require('fs');
              const p = './package/package.json';
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.name = '$scoped_name';
              pkg.version = '$RELEASE_VERSION';
              pkg.publishConfig = { registry: 'https://npm.pkg.github.com', access: 'public' };
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2));
            "
            tar -czf repacked.tgz package/
            npm_out=$(mktemp)
            if ! npm publish repacked.tgz --access public > "$npm_out" 2>&1; then
              if grep -q "Cannot publish over existing version" "$npm_out"; then
                echo "::notice::${scoped_name}@${RELEASE_VERSION} already published — skipping."
              else
                cat "$npm_out"
                rm -f "$npm_out"
                exit 1
              fi
            fi
            cat "$npm_out"; rm -f "$npm_out"
            cd -
            rm -rf "$work"
          }
          publish_package output/package.tgz
          publish_package output/package.r4.tgz
          publish_package output/package.r4b.tgz

      - name: Checkout gh-pages branch into workspace
        run: |
          rm -rf .gh-pages
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            .gh-pages 2>/dev/null || {
              echo "gh-pages branch does not exist yet — creating it."
              mkdir .gh-pages && cd .gh-pages && git init
              git checkout -b gh-pages
              git remote add origin \
                "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            }

      - name: Refuse to overwrite an existing release
        run: |
          REL="${{ steps.v.outputs.version }}"
          if [ -d ".gh-pages/$REL" ]; then
            echo "::error::Release $REL already exists in gh-pages. Refusing to overwrite."
            exit 1
          fi

      - name: Copy release output to gh-pages:/VERSION/
        run: |
          REL="${{ steps.v.outputs.version }}"
          mkdir -p ".gh-pages/$REL"
          rsync -a output/ ".gh-pages/$REL/"

      - name: Update /current/ redirect
        run: |
          REL="${{ steps.v.outputs.version }}"
          mkdir -p ".gh-pages/current"
          cat > ".gh-pages/current/index.html" <<EOF
          <!doctype html>
          <html><head>
          <meta http-equiv="refresh" content="0; url=../$REL/">
          <title>Redirecting to latest release…</title>
          </head><body>
          <p>Redirecting to <a href="../$REL/">$REL</a>…</p>
          </body></html>
          EOF

      - name: Update history.html
        run: |
          python3 - <<'PY'
          import os, re, pathlib
          root = pathlib.Path(".gh-pages")
          versions = []
          for p in root.iterdir():
              if p.is_dir() and re.fullmatch(r"\d+\.\d+\.\d+([\-\.].+)?", p.name):
                  versions.append(p.name)
          versions.sort(
              key=lambda s: [int(x) if x.isdigit() else x for x in re.split(r'(\d+)', s)],
              reverse=True
          )
          html = [
              "<!doctype html>",
              "<html><head><meta charset='utf-8'>",
              "<title>PH Core IG — Publication History</title>",
              "<style>",
              "  body { font-family: sans-serif; max-width: 800px; margin: 2em auto; }",
              "  li   { margin: .5em 0; }",
              "</style>",
              "</head><body>",
              "<h1>Publication History</h1>",
              "<p>All published versions of the PH Core Implementation Guide.</p>",
              "<ul>",
          ]
          for v in versions:
              html.append(f'  <li><a href="./{v}/">{v}</a></li>')
          html += [
              "</ul>",
              "<hr>",
              '<p><a href="./dev/">Development build (latest CI)</a></p>',
              "</body></html>",
          ]
          (root / "history.html").write_text("\n".join(html), encoding="utf-8")
          print(f"Wrote history.html with {len(versions)} release(s)")
          PY

      - name: Update package-list.json
        env:
          RELEASE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          python3 - <<'PY'
          import json, pathlib, os, datetime
          root     = pathlib.Path(".gh-pages")
          pl_path  = root / "package-list.json"
          version  = os.environ["RELEASE_VERSION"]
          canonical = "https://jgsuess.github.io/ph-core"

          if pl_path.exists():
              pl = json.loads(pl_path.read_text(encoding="utf-8"))
          else:
              pl = {
                  "package-id": "fhir.ph.core",
                  "title": "PH Core Implementation Guide",
                  "canonical": canonical,
                  "introduction": "Philippine Core FHIR Implementation Guide",
                  "list": []
              }

          for entry in pl.get("list", []):
              entry["current"] = False

          pl["list"].insert(0, {
              "version": version,
              "date": datetime.date.today().isoformat(),
              "path": f"{canonical}/{version}",
              "status": "draft",
              "fhirversion": "4.0.1",
              "sequence": "Draft",
              "current": True,
          })

          pl_path.write_text(json.dumps(pl, indent=2) + "\n", encoding="utf-8")
          print(f"Updated package-list.json — now {len(pl['list'])} release(s)")
          PY

      - name: Update root index.html (landing page)
        run: |
          python3 - <<'PY'
          import json, re, pathlib, textwrap

          root = pathlib.Path(".gh-pages")

          pl_path = root / "package-list.json"
          releases = []
          if pl_path.exists():
              pl = json.loads(pl_path.read_text(encoding="utf-8"))
              for entry in pl.get("list", []):
                  v = entry["version"]
                  date = entry.get("date", "")
                  is_current = entry.get("current", False)
                  releases.append((v, date, is_current))

          rows = []
          rows.append(
              '<tr>'
              '<td><a href="./dev/">dev</a></td>'
              '<td><span class="badge badge-dev">CI Build</span></td>'
              '<td>Latest continuous-integration build from the <code>main</code> branch.</td>'
              '</tr>'
          )
          for v, date, is_current in releases:
              current_badge = ' <span class="badge badge-current">current</span>' if is_current else ""
              date_str = f" &mdash; published {date}" if date else ""
              rows.append(
                  f'<tr>'
                  f'<td><a href="./{v}/">{v}</a></td>'
                  f'<td><span class="badge badge-release">Release</span>{current_badge}</td>'
                  f'<td>Draft release{date_str}.</td>'
                  f'</tr>'
              )

          html = f"""\
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>PH Core FHIR Implementation Guide</title>
          <style>
            body {{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                   max-width: 800px; margin: 2em auto; padding: 0 1em; color: #24292f; line-height: 1.6; }}
            h1   {{ border-bottom: 1px solid #d1d9e0; padding-bottom: .3em; }}
            h2   {{ margin-top: 1.5em; }}
            a    {{ color: #0969da; text-decoration: none; }}
            a:hover {{ text-decoration: underline; }}
            table {{ border-collapse: collapse; width: 100%; margin: 1em 0; }}
            th, td {{ text-align: left; padding: .5em .75em; border: 1px solid #d1d9e0; }}
            th   {{ background: #f6f8fa; }}
            .badge {{ display: inline-block; padding: .15em .5em; border-radius: 3px;
                     font-size: .85em; font-weight: 600; }}
            .badge-dev     {{ background: #ddf4ff; color: #0969da; }}
            .badge-release {{ background: #dafbe1; color: #1a7f37; }}
            .badge-current {{ background: #fff8c5; color: #9a6700; }}
            footer {{ margin-top: 3em; padding-top: 1em; border-top: 1px solid #d1d9e0;
                     font-size: .85em; color: #656d76; }}
          </style>
          </head>
          <body>

          <h1>PH Core FHIR Implementation Guide</h1>

          <p>
            This is the publication landing page for the <strong>Philippine Core
            FHIR Implementation Guide</strong>&nbsp;&mdash; a fork that tracks the
            upstream <a href="https://github.com/UP-Manila-SILab/ph-core">UP-Manila-SILab/ph-core</a>
            work with automated CI/CD publication.
          </p>

          <p>
            <strong>Source repository:</strong>
            <a href="https://github.com/jgsuess/ph-core">github.com/jgsuess/ph-core</a>
          </p>

          <h2>Published Versions</h2>

          <table>
            <thead>
              <tr><th>Version</th><th>Status</th><th>Description</th></tr>
            </thead>
            <tbody>
              {"".join(rows)}
            </tbody>
          </table>

          <h2>Quick Links</h2>
          <ul>
            <li><a href="./current/">Latest release</a> (redirects to newest tagged version)</li>
            <li><a href="./history.html">Full publication history</a></li>
            <li><a href="./package-list.json">package-list.json</a> (FHIR package feed)</li>
          </ul>

          <footer>
            This page is regenerated automatically by the CI and release workflows.
          </footer>

          </body>
          </html>
          """

          (root / "index.html").write_text(textwrap.dedent(html), encoding="utf-8")
          print(f"Wrote index.html with {len(releases)} release(s)")
          PY

      - name: Commit and push gh-pages
        run: |
          cd .gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: publish ${{ steps.v.outputs.tag }} (IG ${{ steps.v.outputs.version }})" || exit 0
          git push
