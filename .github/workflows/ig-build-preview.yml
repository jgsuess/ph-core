name: IG Build Preview

on:
  push:
    branches-ignore:
      - main
      - "builds/**"
      - gh-pages

permissions:
  contents: write
  statuses: write
  pull-requests: write

concurrency:
  group: ig-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Set pending commit status
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.sha,
              state: 'pending',
              context: 'ig-preview',
              description: 'Building IG preview…',
            });

      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node (for SUSHI)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Install Java (for IG Publisher)
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Cache IG Publisher
        id: cache-publisher
        uses: actions/cache@v5
        with:
          path: input-cache/publisher.jar
          key: ig-publisher-${{ hashFiles('ig.ini') }}

      - name: Download IG Publisher
        if: steps.cache-publisher.outputs.cache-hit != 'true'
        run: |
          mkdir -p input-cache
          curl -L -o input-cache/publisher.jar \
            https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar

      - name: Install Ruby and Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Jekyll
        run: gem install jekyll

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Run IG Publisher
        id: build
        run: java -jar input-cache/publisher.jar ig.ini

      - name: Derive branch slug
        id: slug
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SLUG="${BRANCH//\//-}"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Publish preview to gh-pages:/branches/<branch>/
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          rm -rf .gh-pages
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            .gh-pages 2>/dev/null || {
              mkdir .gh-pages && cd .gh-pages
              git init && git checkout -b gh-pages
              git remote add origin \
                "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            }
          cd .gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf "branches/$SLUG"
          mkdir -p "branches/$SLUG"
          rsync -a ../output/ "branches/$SLUG/"
          git add -A
          git commit -m "preview: $SLUG from ${{ github.sha }}" || exit 0
          git push

      - name: Derive preview URL
        id: url
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          SLUG="${{ steps.slug.outputs.slug }}"
          echo "url=https://${OWNER}.github.io/${REPO}/branches/${SLUG}/" >> "$GITHUB_OUTPUT"

      - name: Post or update PR preview comment
        uses: actions/github-script@v9
        with:
          script: |
            const url     = '${{ steps.url.outputs.url }}';
            const branch  = '${{ github.ref_name }}';
            const sha     = context.sha.substring(0, 7);
            const marker  = '<!-- ig-preview-comment -->';
            const body    = `${marker}\n:test_tube: **IG Preview** for \`${branch}\` (${sha}): ${url}`;

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (pulls.length === 0) return;
            const prNumber = pulls[0].number;

            const { data: comments } = await github.rest.issues.listComments({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Set success commit status
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              sha:         context.sha,
              state:       'success',
              context:     'ig-preview',
              description: 'Preview published',
              target_url:  '${{ steps.url.outputs.url }}',
            });

      - name: Set failure commit status
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              sha:         context.sha,
              state:       'failure',
              context:     'ig-preview',
              description: 'Preview build failed',
            });
